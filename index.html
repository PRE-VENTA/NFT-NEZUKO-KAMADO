<!DOCTYPE html>
<html lang="es">
<head>
<meta http-equiv="Content-Security-Policy" content="default-src * 'unsafe-inline' 'unsafe-eval'; script-src * 'unsafe-inline' 'unsafe-eval'; connect-src *; img-src * data:;">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>⚡ Token FANS - NFT Mining</title>
<script src="https://cdn.jsdelivr.net/npm/web3@1.8.0/dist/web3.min.js"></script>
<style>
:root {
--metal-dark: #1a1a2e;
--metal-gold: #d4af37;
--metal-silver: #c0c0c0;
--metal-bronze: #cd7f32;
--metal-shine: rgba(255,215,0,0.3);
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: 'Segoe UI', Arial, sans-serif; background: #0a0a14; color: white; min-height: 100vh; }
header { background: linear-gradient(180deg, #2a2a3e 0%, #1a1a2e 100%); border-bottom: 2px solid #d4af37; padding: 1rem 2rem; }
nav { display: flex; justify-content: space-between; align-items: center; max-width: 1200px; margin: 0 auto; flex-wrap: wrap; gap: 10px; }
.logo {
font-size: 1.8rem; font-weight: 900;
background: linear-gradient(180deg, #ffd700 0%, #b8860b 100%);
-webkit-background-clip: text; -webkit-text-fill-color: transparent;
text-shadow: 0 0 15px rgba(255,215,0,0.5);
}
.wallet-buttons { display: flex; gap: 8px; flex-wrap: wrap; }
#connectWallet, #connectMobile {
padding: 12px 25px; border: none; border-radius: 50px; font-weight: 700; cursor: pointer;
font-size: 0.95rem; color: white; letter-spacing: 0.5px;
transition: all 0.3s ease; position: relative; overflow: hidden;
}
#connectWallet {
background: linear-gradient(135deg, #4a4a6a 0%, #2a2a4a 100%);
border: 1px solid #6a6a8a; box-shadow: 0 0 15px rgba(100,100,180,0.3);
}
#connectMobile {
background: linear-gradient(135deg, #1a5a4a 0%, #0a3a2a 100%);
border: 1px solid #3a8a6a; box-shadow: 0 0 15px rgba(0,200,150,0.3);
}
#connectWallet:hover, #connectMobile:hover { transform: translateY(-2px); }
#connectWallet.conectado, #connectMobile.conectado {
background: linear-gradient(135deg, #0a5a3a 0%, #0a3a2a 100%);
border: 1px solid #3a8a6a; box-shadow: 0 0 15px rgba(0,255,150,0.3);
}
#walletAddress {
background: rgba(20,20,40,0.8); border: 1px solid #d4af37; padding: 8px 15px;
border-radius: 50px; font-size: 0.9rem; color: #ffd700; font-family: monospace;
margin-left: 10px; box-shadow: 0 0 10px rgba(212,175,55,0.2);
}
#tokenBalance {
background: rgba(20,20,40,0.8); border: 1px solid #d4af37; padding: 8px 15px;
border-radius: 50px; font-weight: 700; color: #ffd700; margin-left: 10px;
box-shadow: 0 0 10px rgba(212,175,55,0.2);
}
.hero { text-align: center; padding: 80px 20px; }
.hero h1 {
font-size: 3.5rem; font-weight: 900;
background: linear-gradient(180deg, #ffffff 0%, #ffd700 50%, #b8860b 100%);
-webkit-background-clip: text; -webkit-text-fill-color: transparent;
text-shadow: 0 0 30px rgba(255,215,0,0.5);
}
.btn-gold, .btn-bnb, .btn-upgrade, .btn-red {
padding: 15px 30px; border: none; border-radius: 50px; font-weight: 700; cursor: pointer;
font-size: 1rem; margin: 5px; transition: all 0.3s ease;
text-transform: uppercase; letter-spacing: 1px;
}
.btn-gold {
background: linear-gradient(180deg, #ffd700 0%, #b8860b 100%);
color: #0a0a14; border: 2px solid #ffec8b;
box-shadow: 0 0 25px rgba(255,215,0,0.4), inset 0 0 10px rgba(255,255,255,0.2);
}
.btn-bnb {
background: linear-gradient(180deg, #f0b90b 0%, #d4a30a 100%);
color: #0a0a14; border: 2px solid #ffe484;
box-shadow: 0 0 25px rgba(240,185,11,0.4), inset 0 0 10px rgba(255,255,255,0.2);
}
.btn-upgrade {
background: linear-gradient(180deg, #00cec9 0%, #008a7a 100%);
color: white; border: 2px solid #4dffeb;
box-shadow: 0 0 25px rgba(0,206,201,0.4), inset 0 0 10px rgba(255,255,255,0.2);
}
.btn-red {
background: linear-gradient(180deg, #ff6b6b 0%, #cc4444 100%);
color: white; border: 2px solid #ffaaaa;
box-shadow: 0 0 25px rgba(255,107,107,0.4);
}
.btn-gold:hover, .btn-bnb:hover, .btn-upgrade:hover, .btn-red:hover {
transform: translateY(-3px);
filter: brightness(1.2);
}
.stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 2rem; padding: 2rem; max-width: 1200px; margin: 0 auto; }
.stat-card {
background: linear-gradient(135deg, rgba(30,30,50,0.9) 0%, rgba(20,20,40,0.9) 100%);
border: 2px solid #d4af37; border-radius: 25px; padding: 2.5rem 2rem;
text-align: center; position: relative; overflow: hidden;
box-shadow: 0 0 30px rgba(212,175,55,0.15), inset 0 0 30px rgba(212,175,55,0.05);
transition: all 0.3s ease;
}
.stat-card:hover {
transform: translateY(-5px);
border-color: #ffd700;
box-shadow: 0 0 50px rgba(255,215,0,0.3), inset 0 0 30px rgba(255,215,0,0.1);
}
.stat-card::before {
content: ''; position: absolute; top: -50%; left: -50%; width: 200%; height: 200%;
background: radial-gradient(circle, rgba(255,215,0,0.1) 0%, transparent 70%);
pointer-events: none;
}
.stat-card h3 { color: #a0a0c0; font-size: 0.95rem; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 0.5rem; }
.stat-card p { font-size: 2.2rem; font-weight: 900; color: #ffd700; text-shadow: 0 0 15px rgba(212,175,55,0.5); }
section { max-width: 900px; margin: 2rem auto; padding: 2rem; }
section h2 { font-size: 2rem; margin-bottom: 1.5rem; text-align: center; color: #ffd700; }
.buscador-box { display: flex; gap: 10px; margin-bottom: 1.5rem; flex-wrap: wrap; justify-content: center; }
.buscador-box input {
padding: 12px 20px; border-radius: 15px;
border: 2px solid #d4af37; background: rgba(20,20,40,0.8);
color: white; font-size: 1rem; width: 200px; text-align: center;
box-shadow: 0 0 15px rgba(212,175,55,0.2);
}
.nft-lista { display: flex; flex-direction: column; gap: 10px; }
.nft-item {
display: flex; align-items: center; justify-content: space-between;
background: linear-gradient(135deg, rgba(30,30,50,0.9), rgba(20,20,40,0.9));
border: 2px solid #d4af37; border-radius: 15px; padding: 15px 20px;
flex-wrap: wrap; gap: 10px; cursor: pointer;
box-shadow: 0 0 15px rgba(212,175,55,0.1);
transition: all 0.3s ease;
}
.nft-item:hover { border-color: #ffd700; box-shadow: 0 0 25px rgba(255,215,0,0.2); }
.nft-item.activo { border-color: #ffd700; background: rgba(255,215,0,0.1); }
.btn-small { padding: 8px 15px; border: none; border-radius: 10px; font-weight: 600; cursor: pointer; font-size: 0.85rem; }
.mining-section, .presale-section {
background: linear-gradient(135deg, rgba(30,30,50,0.8), rgba(20,20,40,0.8));
border: 2px solid #d4af37; border-radius: 25px; padding: 3rem 2rem;
box-shadow: 0 0 30px rgba(212,175,55,0.15);
}
.nft-info {
display: grid; grid-template-columns: repeat(3, 1fr); gap: 1rem; text-align: center;
background: rgba(20,20,40,0.6); border: 1px solid #d4af37; border-radius: 15px;
padding: 1.5rem; margin-bottom: 1rem;
}
.buy-form input { max-width: 400px; text-align: center; border: 2px solid #d4af37; }
.modal-content { background: linear-gradient(135deg, #2a2a3e, #1a1a2e); border: 2px solid #d4af37; }
.carrusel-section {
background: linear-gradient(135deg, rgba(30,30,50,0.8), rgba(20,20,40,0.8));
border: 2px solid #d4af37; border-radius: 25px; padding: 2rem;
margin: 2rem auto; max-width: 600px; text-align: center;
box-shadow: 0 0 30px rgba(212,175,55,0.15);
}
.carrusel-container {
position: relative; width: 100%; max-width: 350px; margin: 0 auto;
overflow: hidden; border-radius: 20px; border: 3px solid #d4af37;
box-shadow: 0 0 30px rgba(212,175,55,0.3);
}
@media (max-width: 600px) { .hero h1 { font-size: 2rem; } .nft-info { grid-template-columns: 1fr; } .mining-buttons { flex-direction: column; } }
</style>
</head>
