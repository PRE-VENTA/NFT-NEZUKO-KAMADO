<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Test Conexión</title>
<script src="https://cdn.jsdelivr.net/npm/web3@1.8.0/dist/web3.min.js"></script>
</head>
<body style="background:#0C0C1E; color:white; font-family:Arial; padding:50px; text-align:center;">

<h1>🧪 TEST DE CONEXIÓN</h1>

<button id="btnConectar" onclick="conectar()" style="padding:20px 40px; font-size:20px; background:#6C5CE7; color:white; border:none; border-radius:10px; cursor:pointer;">
🔌 Conectar Wallet
</button>

<div id="info" style="margin-top:30px; font-size:18px;"></div>

<script>
let web3;
let userAccount;

async function conectar() {
const info = document.getElementById('info');
const btn = document.getElementById('btnConectar');

info.innerHTML = '🔄 Probando...';

// Test 1: MetaMask
if (typeof window.ethereum === 'undefined') {
info.innerHTML = '❌ MetaMask NO instalado';
return;
}
info.innerHTML += '<br>✅ Test 1: MetaMask detectado';

// Test 2: Web3
web3 = new Web3(window.ethereum);
info.innerHTML += '<br>✅ Test 2: Web3 inicializado';

// Test 3: Pedir cuentas
try {
const accounts = await window.ethereum.request({ method: 'eth_requestAccounts' });
userAccount = accounts[0];
info.innerHTML += '<br>✅ Test 3: Cuenta obtenida: ' + userAccount.substring(0, 8) + '...';
} catch (e) {
info.innerHTML += '<br>❌ Test 3 FALLÓ: ' + e.message;
return;
}

// Test 4: Red
const chainId = await window.ethereum.request({ method: 'eth_chainId' });
info.innerHTML += '<br>🔍 Test 4: Red = ' + chainId + (chainId === '0x38' ? ' (BSC ✅)' : ' (NO es BSC)');

// Test 5: Balance BNB
const balance = await web3.eth.getBalance(userAccount);
info.innerHTML += '<br>💰 Test 5: Balance = ' + web3.utils.fromWei(balance, 'ether') + ' BNB';

// Test 6: Leer contrato
try {
const abi = [{"inputs":[],"name":"symbol","outputs":[{"internalType":"string","name":"","type":"string"}],"stateMutability":"view","type":"function"}];
const contrato = new web3.eth.Contract(abi, '0x39c9deff5c68d62a8acb3215b18fff8d0baff349');
const symbol = await contrato.methods.symbol().call();
info.innerHTML += '<br>✅ Test 6: Token = ' + symbol;
} catch (e) {
info.innerHTML += '<br>❌ Test 6 FALLÓ: ' + e.message;
}

// ÉXITO
btn.textContent = '✅ Conectado';
btn.style.background = '#00B894';
info.innerHTML += '<br><br>🎉 TODOS LOS TEST PASARON';
}
</script>

</body>
</html>
